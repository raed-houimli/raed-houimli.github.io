name: Deploy to houimliraed.dev

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
      env:
        VITE_SITE_URL: https://houimliraed.dev
    
    - name: Deploy to Hostinger via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.HOSTINGER_SERVER }}
        username: ${{ secrets.HOSTINGER_USERNAME }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 22
        source: "dist/*"
        target: "/public_html"
        strip_components: 1
        rm: false
    
    - name: Deployment Status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment to houimliraed.dev completed successfully! 🎉"
          echo "🌐 Primary URL: https://houimliraed.dev"
          echo "🌐 WWW URL: https://www.houimliraed.dev"
        else
          echo "❌ Deployment failed. Check logs above...."
        fi
