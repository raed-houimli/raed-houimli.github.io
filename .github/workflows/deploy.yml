name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build
      env:
        VITE_SITE_URL: https://houimliraed.dev

    - name: Validate FTP host
      env:
        HOST: ${{ secrets.HOSTINGER_SERVER }}
      run: |
        if [ -z "$HOST" ]; then
          echo "❌ HOSTINGER_SERVER is empty"
          exit 1
        fi
        if echo "$HOST" | grep -q "://"; then
          echo "❌ HOSTINGER_SERVER must be hostname only (no ftp://)"
          exit 1
        fi
        getent hosts "$HOST" >/dev/null || {
          echo "❌ HOSTINGER_SERVER cannot be resolved"
          exit 1
        }

    - name: Upload via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.HOSTINGER_SERVER }}
        username: ${{ secrets.HOSTINGER_USERNAME }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        local-dir: ./dist/
        server-dir: /public_html/
        protocol: ftp
        dangerous-clean-slate: false
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**

    - name: Deployment Status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment to Hostinger completed successfully! 🎉"
        else
          echo "❌ Deployment failed. Check logs above...."
        fi
