name: Deploy to houimliraed.dev

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
      env:
        VITE_SITE_URL: https://houimliraed.dev
    
    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp
    
    - name: Debug FTP Connection
      env:
        FTP_SERVER: ${{ secrets.HOSTINGER_SERVER }}
        FTP_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
      run: |
        echo "Attempting to connect to FTP server: $FTP_SERVER"
        echo "Using username: $FTP_USERNAME"
        ping -c 3 $FTP_SERVER || echo "Cannot ping server"
    
    - name: Deploy via FTP using lftp
      env:
        FTP_SERVER: ${{ secrets.HOSTINGER_SERVER }}
        FTP_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
        FTP_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
      run: |
        lftp -c "
        set ssl:verify-certificate no;
        set ftp:ssl-allow yes;
        set ftp:ssl-protect-data yes;
        set ftp:passive-mode on;
        set net:timeout 30;
        set net:max-retries 3;
        set net:reconnect-interval-base 5;
        open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
        cd /public_html || exit 1;
        mirror --reverse --delete --verbose --exclude .git/ --exclude .github/ dist/ .;
        bye
        "
    
    - name: Deployment Status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment to houimliraed.dev completed successfully! 🎉"
          echo "🌐 Primary URL: https://houimliraed.dev"
          echo "🌐 WWW URL: https://www.houimliraed.dev"
        else
          echo "❌ Deployment failed. Check logs above...."
        fi
