name: Deploy to houimliraed.dev

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
      env:
        VITE_SITE_URL: https://houimliraed.dev
    
    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp
    
    - name: Deploy via FTP using lftp
      env:
        FTP_SERVER: ${{ secrets.HOSTINGER_SERVER }}
        FTP_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
        FTP_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
      run: |
        lftp -c "
        set ssl:verify-certificate no;
        set ftp:ssl-allow yes;
        set ftp:ssl-protect-data yes;
        open ftp://$FTP_USERNAME:$FTP_PASSWORD@$FTP_SERVER;
        mirror --reverse --delete --verbose --exclude .git/ --exclude .github/ dist/ /public_html/;
        bye
        "
    
    - name: Deployment Status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment to houimliraed.dev completed successfully! 🎉"
          echo "🌐 Primary URL: https://houimliraed.dev"
          echo "🌐 WWW URL: https://www.houimliraed.dev"
        else
          echo "❌ Deployment failed. Check logs above...."
        fi
